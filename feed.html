<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { navy: { DEFAULT: '#1A237E', deep: '#11185A', ink: '#0A0E3D' }, mustard: { DEFAULT: '#F5C518', soft: '#FFD84D', deep: '#C99A00' }, alert: '#D32F2F', cream: '#FAF7F0', paper: '#F5F1E8' }, fontFamily: { sans: ['Inter','system-ui','sans-serif'], serif: ['Fraunces','Georgia','serif'] } } } };
</script>
<style>
  body { font-family: 'Inter', sans-serif; background: #FAF7F0; color: #0A0E3D; }
  .font-serif { font-family: 'Fraunces', serif; }
  .ig-1 { background: #1A237E; color: #FAF7F0; }
  .ig-2 { background: #F5C518; color: #0A0E3D; }
  .ig-3 { background: #FAF7F0; color: #0A0E3D; border: 1px solid #E8E1CC; }
  .ig-4 { background: #D32F2F; color: #FAF7F0; }
  .ig-5 { background: #0A0E3D; color: #F5C518; }
  .ig-6 { background: #FAF7F0; color: #1A237E; border: 1px solid #E8E1CC; }
  .lift { transition: transform 200ms ease; cursor: pointer; }
  .lift:hover { transform: translateY(-2px); }
  .chip { padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; transition: all 150ms ease; }
</style>
</head>
<body class="antialiased">

<!-- NAV -->
<header class="sticky top-0 z-50 backdrop-blur bg-cream/85 border-b border-navy/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <img src="logo.png" alt="ThisOrThat" class="w-10 h-10 rounded-full object-cover" />
      <div class="leading-tight">
        <div class="font-bold text-navy-ink text-[15px]">ThisOrThat</div>
        <div class="text-[11px] text-navy/60 uppercase tracking-widest">with Bhartendra</div>
      </div>
    </a>
    <nav class="hidden md:flex items-center gap-7 text-sm font-medium text-navy-ink/80">
      <a href="episodes.html" class="hover:text-navy-ink">Episodes</a>
      <a href="guests.html" class="hover:text-navy-ink">Guests</a>
      <a href="articles.html" class="hover:text-navy-ink">Articles</a>
      <a href="feed.html" class="text-navy-ink border-b-2 border-mustard pb-1">Feed</a>
      <a href="calculators.html" class="hover:text-navy-ink">Calculators</a>

<!-- PAGE HEADER -->
<section class="bg-cream py-16">
  <div class="max-w-7xl mx-auto px-6">
    <div class="text-xs uppercase tracking-[0.3em] text-navy/60 font-semibold">The feed</div>
    <h1 class="font-serif text-5xl md:text-6xl font-bold text-navy-ink mt-3">Pocket-sized insights.</h1>
    <p class="mt-4 text-navy-ink/70 text-lg max-w-2xl">The best ideas from the show, redesigned for screenshots, saves and shares. New cards every week.</p>

    <div class="mt-8 flex flex-wrap gap-2">
      <button class="chip bg-navy text-cream">All (148)</button>
      <button class="chip bg-paper text-navy-ink hover:bg-navy/10 border border-navy/10">Slow Thought (42)</button>
      <button class="chip bg-paper text-navy-ink hover:bg-navy/10 border border-navy/10">Data cards (38)</button>
      <button class="chip bg-paper text-navy-ink hover:bg-navy/10 border border-navy/10">Guest quotes (35)</button>
      <button class="chip bg-paper text-navy-ink hover:bg-navy/10 border border-navy/10">Carousels (21)</button>
      <button class="chip bg-paper text-navy-ink hover:bg-navy/10 border border-navy/10">Behaviour</button>
      <button class="chip bg-paper text-navy-ink hover:bg-navy/10 border border-navy/10">Markets</button>
    </div>
  </div>
</section>

<!-- FEED GRID -->
<section class="pb-20 bg-cream">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="feed-grid"></div>

    <div class="text-center mt-12">
      <button class="bg-navy text-cream px-6 py-3 rounded-full font-semibold hover:bg-navy-ink transition">Load more →</button>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-navy-ink text-cream/80 py-14">
  <div class="max-w-7xl mx-auto px-6 text-center">
    <div class="text-xs text-cream/40">© 2026 ThisOrThat with Bhartendra.</div>
  </div>
</footer>

<script>
const cards = [
  { variant: 'ig-1', label: 'Slow Thought · 042', html: '<div class="font-serif text-2xl leading-tight font-bold">The market doesn\'t reward intelligence. It rewards patience that looks like stupidity.</div>', meta: '♥ 4.2K' },
  { variant: 'ig-2', label: 'Data card', html: '<div><div class="font-serif text-5xl font-black">73%</div><div class="font-serif text-base font-semibold mt-2 leading-snug">of active equity funds underperform their benchmark over 10 years.</div></div>', meta: 'SPIVA India 2024' },
  { variant: 'ig-3', label: 'Quote · Ep 086', html: '<div class="font-serif text-xl leading-snug font-semibold">"The hardest part of investing isn\'t picking the right stock. It\'s not selling the right stock too early."</div><div class="text-xs font-semibold mt-3">— Saurabh Mukherjea</div>', meta: '' },
  { variant: 'ig-4', label: 'ThisOrThat', html: '<div class="font-serif text-3xl font-bold leading-tight">A 1% expense ratio over 30 years eats 26% of your final corpus.</div>', meta: '♥ 5.1K' },
  { variant: 'ig-5', label: 'Insight', html: '<div class="font-serif text-2xl leading-tight font-bold">Your portfolio doesn\'t care that you\'re stressed. <span class="text-cream">But your decisions do.</span></div>', meta: 'Slow Thought 038' },
  { variant: 'ig-6', label: 'Carousel · 8 slides', html: '<div class="font-serif text-xl leading-snug font-semibold">How to read a mutual fund factsheet in 60 seconds — without falling for the marketing.</div>', meta: 'Swipe →' },
  { variant: 'ig-2', label: 'ThisOrThat', html: '<div class="font-serif text-2xl font-bold leading-tight">Real estate <span class="italic">felt</span> safe. Equity <span class="italic">looked</span> risky. Over 20 years, only one built wealth.</div>', meta: '♥ 6.4K' },
  { variant: 'ig-1', label: 'Behaviour', html: '<div class="font-serif text-2xl font-bold leading-tight">If you can\'t explain your portfolio in one sentence, you don\'t own it. <span class="text-mustard">It owns you.</span></div>', meta: 'Slow Thought 029' },
  { variant: 'ig-3', label: 'Data card · Tax', html: '<div><div class="font-serif text-5xl font-black">₹2.4L</div><div class="font-serif text-base font-semibold mt-2 leading-snug">average annual tax leakage from sub-optimal salary structuring.</div></div>', meta: 'ClearTax 2025' },
  { variant: 'ig-5', label: 'Quote · Ep 087', html: '<div class="font-serif text-xl leading-snug font-semibold">"You don\'t retire on your salary. You retire on the discipline of your 30s."</div><div class="text-xs font-semibold mt-3 text-cream/80">— Monika Halan</div>', meta: '' },
  { variant: 'ig-4', label: 'Slow Thought · 044', html: '<div class="font-serif text-2xl leading-tight font-bold">Most "long-term investors" are short-term investors who haven\'t had their nerve tested yet.</div>', meta: '♥ 3.8K' },
  { variant: 'ig-2', label: 'Data card', html: '<div><div class="font-serif text-5xl font-black">8.2%</div><div class="font-serif text-base font-semibold mt-2 leading-snug">real return of Indian equity over 25 years. The asset everyone is "scared of."</div></div>', meta: 'NSE Total Returns Index' },
  { variant: 'ig-6', label: 'Insight', html: '<div class="font-serif text-2xl leading-tight font-semibold">Your insurance agent is not your financial advisor. <br/><br/>Stop confusing the two.</div>', meta: 'ThisOrThat' },
  { variant: 'ig-1', label: 'Carousel · 6 slides', html: '<div class="font-serif text-xl leading-snug font-semibold">The 5 numbers you should know about your own finances. Most people don\'t know any of them.</div>', meta: 'Swipe →' },
  { variant: 'ig-3', label: 'Quote · Ep 081', html: '<div class="font-serif text-xl leading-snug font-semibold">"You can be richer than your neighbour and poorer than yourself. Both at the same time."</div><div class="text-xs font-semibold mt-3">— Morgan Housel</div>', meta: '' },
  { variant: 'ig-4', label: 'Slow Thought · 040', html: '<div class="font-serif text-2xl leading-tight font-bold">The most expensive sentence in personal finance: "I\'ll start next month."</div>', meta: '♥ 7.1K' },
];

const grid = document.getElementById('feed-grid');
grid.innerHTML = cards.map(c => `
  <div class="lift ${c.variant} aspect-square rounded-2xl p-6 flex flex-col justify-between">
    <div class="text-[10px] uppercase tracking-widest opacity-70 font-semibold">${c.label}</div>
    ${c.html}
    <div class="flex items-center justify-between text-[11px] opacity-70">
      <span>ThisOrThat</span>
      <span>${c.meta}</span>
    </div>
  </div>
`).join('');
</script>

</body>
</html>
