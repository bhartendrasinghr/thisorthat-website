name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily YouTube re-sync at 06:00 UTC (11:30 IST)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site (articles + YouTube sync)
        run: |
          # Skip YT sync if scraping fails — articles compile still happens
          python3 build.py || (echo "Build had errors, retrying with sync skipped"; SKIP_YT_SYNC=1 python3 build.py)

      - name: Disable Jekyll
        run: touch .nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
