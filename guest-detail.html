<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guest — ThisOrThat with Bhartendra</title>
<link rel="icon" type="image/png" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { navy: { DEFAULT: '#1A237E', deep: '#11185A', ink: '#0A0E3D' }, mustard: { DEFAULT: '#F5C518', soft: '#FFD84D', deep: '#C99A00' }, alert: '#D32F2F', cream: '#FAF7F0', paper: '#F5F1E8' }, fontFamily: { sans: ['Inter','system-ui','sans-serif'], serif: ['Fraunces','Georgia','serif'] } } } };
</script>
<style>
  body { font-family: 'Inter', sans-serif; background: #FAF7F0; color: #0A0E3D; }
  .font-serif { font-family: 'Fraunces', serif; }
  .lift { transition: transform 200ms ease; }
  .lift:hover { transform: translateY(-2px); }
  .avatar { display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
  .bio p { font-family: 'Fraunces', serif; font-size: 18px; line-height: 1.75; color: #0A0E3D; margin-bottom: 1.3em; }
  .bio h2 { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; color: #0A0E3D; margin-top: 1.8em; margin-bottom: 0.6em; }
  .bio blockquote { border-left: 4px solid #F5C518; padding-left: 1.4em; margin: 1.6em 0; font-style: italic; font-size: 20px; color: #1A237E; }
  .bio ul { margin: 1.2em 0; padding-left: 1.4em; }
  .bio li { font-family: 'Fraunces', serif; font-size: 18px; line-height: 1.7; margin-bottom: 0.4em; list-style: disc; }
  .bio a { color: #1A237E; border-bottom: 2px solid #F5C518; }
</style>
</head>
<body class="antialiased">

<!-- NAV -->
<header class="sticky top-0 z-50 backdrop-blur bg-cream/85 border-b border-navy/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <img src="logo.png" alt="ThisOrThat" class="w-10 h-10 rounded-full object-cover" />
      <div class="leading-tight">
        <div class="font-bold text-navy-ink text-[15px]">ThisOrThat</div>
        <div class="text-[11px] text-navy/60 uppercase tracking-widest">with Bhartendra</div>
      </div>
    </a>
    <nav class="hidden md:flex items-center gap-7 text-sm font-medium text-navy-ink/80">
      <a href="episodes.html" class="hover:text-navy-ink">Episodes</a>
      <a href="guests.html" class="text-navy-ink border-b-2 border-mustard pb-1">Guests</a>
      <a href="articles.html" class="hover:text-navy-ink">Articles</a>
      <a href="feed.html" class="hover:text-navy-ink">Feed</a>
      <a href="calculators.html" class="hover:text-navy-ink">Calculators</a>
      <a href="about.html" class="hover:text-navy-ink">About</a>
    </nav>
  </div>
</header>

<!-- BREADCRUMB -->
<div class="max-w-6xl mx-auto px-6 py-4 text-xs text-navy/60">
  <a href="index.html" class="hover:text-navy">Home</a> /
  <a href="guests.html" class="hover:text-navy">Guests</a> /
  <span class="text-navy-ink" id="bc-guest">Guest</span>
</div>

<!-- HERO -->
<section class="py-12 bg-cream">
  <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-5 gap-12 items-center">
    <div class="md:col-span-2">
      <!-- Either <img> photo or <div> initials avatar — set by JS -->
      <div id="g-photo-slot" class="w-full aspect-square rounded-3xl overflow-hidden"></div>
    </div>
    <div class="md:col-span-3">
      <div id="g-eyebrow" class="text-xs uppercase tracking-[0.3em] text-mustard-deep font-semibold">Featured guest</div>
      <h1 id="g-name" class="font-serif text-5xl md:text-6xl font-bold text-navy-ink mt-2 leading-[1.05]">Loading…</h1>
      <p id="g-role" class="mt-2 text-lg text-navy-ink/70">—</p>

      <div id="g-social" class="mt-6 flex flex-wrap gap-3"></div>
    </div>
  </div>
</section>

<!-- BIO -->
<section id="bio-section" class="hidden py-16 bg-paper">
  <div class="max-w-3xl mx-auto px-6">
    <div id="g-bio" class="bio"></div>
  </div>
</section>

<!-- THEIR EPISODES -->
<section id="episodes" class="py-16 bg-cream">
  <div class="max-w-6xl mx-auto px-6">
    <h2 id="g-eps-title" class="font-serif text-4xl font-bold text-navy-ink">All episodes</h2>
    <p class="text-navy-ink/70 mt-2">Latest first.</p>
    <div id="g-eps-grid" class="mt-10 grid md:grid-cols-3 gap-6"></div>
  </div>
</section>

<!-- OTHER GUESTS -->
<section class="py-16 bg-paper">
  <div class="max-w-6xl mx-auto px-6">
    <h2 class="font-serif text-3xl font-bold text-navy-ink">Other guests on the show</h2>
    <div id="other-guests" class="mt-8 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5"></div>
  </div>
</section>

<footer class="bg-navy-ink text-cream/80 py-14">
  <div class="max-w-7xl mx-auto px-6 text-center">
    <div class="text-xs text-cream/40">© 2026 ThisOrThat with Bhartendra.</div>
  </div>
</footer>

<script src="episodes.js"></script>
<script>
// Merge auto-derived guest list (from episodes.js) with rich profiles (from content/guests.json)
const params = new URLSearchParams(window.location.search);

Promise.all([
  // Auto-derived: name, role (auto-guessed), eps count, initials, bg
  Promise.resolve(window.GUESTS || []),
  // Rich CMS: name, role (override), photo, bio_html, social links
  fetch('content/guests.json').then(r => r.ok ? r.json() : []).catch(() => []),
])
.then(([autoGuests, richGuests]) => {
  // Merge by name (richGuests overrides autoGuests fields when present)
  const richByName = Object.fromEntries(richGuests.map(g => [g.name, g]));
  const merged = autoGuests.map(g => ({ ...g, ...(richByName[g.name] || {}) }));

  // Pick which guest to show: ?g=Name (preferred) or ?slug=slug
  const wantName = params.get('g');
  const wantSlug = params.get('slug');
  const guest = merged.find(g =>
    (wantName && g.name === wantName) ||
    (wantSlug && g.slug === wantSlug)
  ) || merged[0]; // default = top guest by eps count

  if (!guest) {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:Inter,sans-serif"><h1 style="font-family:Fraunces,serif;font-size:42px">No guests yet</h1><p><a href="guests.html" style="color:#1A237E">← Back</a></p></div>';
    return;
  }

  const guestEps = (window.EPISODES || []).filter(e => e.guest === guest.name).sort((a, b) => b.n - a.n);

  // Header / title / breadcrumb
  document.title = `${guest.name} — ThisOrThat with Bhartendra`;
  document.getElementById('bc-guest').textContent = guest.name;
  document.getElementById('g-name').textContent = guest.name;
  document.getElementById('g-role').textContent = guest.role || 'Guest';
  document.getElementById('g-eyebrow').textContent = `Guest · ${guestEps.length} episode${guestEps.length !== 1 ? 's' : ''}`;
  document.getElementById('g-eps-title').textContent = `${guestEps.length === 1 ? '1 episode' : 'All ' + guestEps.length + ' episodes'} with ${guest.name.split(' ')[0]}`;

  // Photo or initials
  const photoSlot = document.getElementById('g-photo-slot');
  if (guest.photo) {
    photoSlot.innerHTML = `<img src="${guest.photo}" alt="${guest.name}" class="w-full h-full object-cover" />`;
  } else {
    photoSlot.className = `avatar w-full aspect-square rounded-3xl ${guest.bg || 'bg-navy text-mustard'} text-7xl`;
    photoSlot.textContent = guest.initials || guest.name.split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase();
  }

  // Social buttons + watch CTA
  const socials = [];
  socials.push(`<a href="#episodes" class="bg-navy text-cream px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-navy-ink transition">Watch episodes →</a>`);
  if (guest.linkedin)  socials.push(`<a href="${guest.linkedin}" target="_blank" class="border border-navy/20 text-navy-ink px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-navy hover:text-cream transition">LinkedIn</a>`);
  if (guest.twitter)   socials.push(`<a href="${guest.twitter}" target="_blank" class="border border-navy/20 text-navy-ink px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-navy hover:text-cream transition">Twitter / X</a>`);
  if (guest.website)   socials.push(`<a href="${guest.website}" target="_blank" class="border border-navy/20 text-navy-ink px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-navy hover:text-cream transition">Website</a>`);
  document.getElementById('g-social').innerHTML = socials.join('');

  // Bio (only show section if there's content)
  if (guest.bio_html && guest.bio_html.trim()) {
    document.getElementById('bio-section').classList.remove('hidden');
    document.getElementById('g-bio').innerHTML = guest.bio_html;
  }

  // Episodes
  document.getElementById('g-eps-grid').innerHTML = guestEps.map(e => `
    <a href="episode-detail.html?v=${e.id}" class="lift block bg-white rounded-2xl overflow-hidden border border-navy/10">
      <div class="aspect-video relative overflow-hidden bg-navy-ink">
        <img src="${e.thumb}" alt="" class="absolute inset-0 w-full h-full object-cover" loading="lazy" />
        <div class="absolute top-3 left-3 bg-navy-ink/85 text-cream text-[11px] uppercase tracking-widest px-2 py-1 rounded">Ep ${String(e.n).padStart(3,'0')}</div>
        ${e.views ? `<div class="absolute bottom-3 right-3 bg-navy-ink/85 text-cream text-xs px-2 py-1 rounded">${e.views} views</div>` : ''}
      </div>
      <div class="p-5">
        <div class="text-xs text-navy/60 uppercase tracking-widest font-semibold">${e.cat} · ${e.published || ''}</div>
        <h3 class="font-serif text-lg font-bold text-navy-ink mt-1 leading-snug">${e.title}</h3>
      </div>
    </a>
  `).join('');

  // Other guests — prefer rich data, with photos where available
  const others = merged.filter(g => g.name !== guest.name).slice(0, 6);
  document.getElementById('other-guests').innerHTML = others.map(g => `
    <a href="guest-detail.html?g=${encodeURIComponent(g.name)}" class="lift group block text-center">
      ${g.photo
        ? `<div class="w-full aspect-square rounded-xl overflow-hidden"><img src="${g.photo}" alt="${g.name}" class="w-full h-full object-cover" loading="lazy" /></div>`
        : `<div class="avatar w-full aspect-square rounded-xl ${g.bg || 'bg-navy text-mustard'} text-3xl">${g.initials || g.name.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase()}</div>`
      }
      <div class="mt-3 font-semibold text-navy-ink text-sm group-hover:text-navy">${g.name}</div>
      <div class="text-xs text-navy/60 mt-1">${g.eps || 0} ep${g.eps !== 1 ? 's' : ''}</div>
    </a>
  `).join('');
});
</script>

</body>
</html>
