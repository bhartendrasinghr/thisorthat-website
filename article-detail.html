<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Article — ThisOrThat with Bhartendra</title>
<link rel="icon" type="image/png" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: { navy: { DEFAULT: '#1A237E', deep: '#11185A', ink: '#0A0E3D' }, mustard: { DEFAULT: '#F5C518', soft: '#FFD84D', deep: '#C99A00' }, alert: '#D32F2F', cream: '#FAF7F0', paper: '#F5F1E8' }, fontFamily: { sans: ['Inter','system-ui','sans-serif'], serif: ['Fraunces','Georgia','serif'] } } } };
</script>
<style>
  body { font-family: 'Inter', sans-serif; background: #FAF7F0; color: #0A0E3D; }
  .font-serif { font-family: 'Fraunces', serif; }
  .thumb { position: relative; overflow: hidden; }
  .thumb::before { content:''; position:absolute; inset:0; background: radial-gradient(circle at 20% 80%, rgba(245,197,24,0.35), transparent 50%), radial-gradient(circle at 80% 20%, rgba(211,47,47,0.25), transparent 50%); }
  .thumb-1 { background: linear-gradient(135deg, #1A237E, #4A148C); }
  .thumb-2 { background: linear-gradient(135deg, #11185A, #1A237E); }
  .thumb-3 { background: linear-gradient(135deg, #C99A00, #F5C518); }
  .thumb-4 { background: linear-gradient(135deg, #0A0E3D, #1A237E); }
  .thumb-5 { background: linear-gradient(135deg, #D32F2F, #8B1A1A); }
  .thumb-6 { background: linear-gradient(135deg, #1A237E, #0A0E3D); }
  .lift { transition: transform 200ms ease; }
  .lift:hover { transform: translateY(-2px); }
  .avatar { display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
  .prose-essay p { font-family: 'Fraunces', serif; font-size: 19px; line-height: 1.75; color: #0A0E3D; margin-bottom: 1.4em; }
  .prose-essay p:first-of-type::first-letter { font-size: 4em; float: left; line-height: 0.85; margin: 0.05em 0.12em 0 0; font-weight: 700; color: #1A237E; }
  .prose-essay h2 { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; color: #0A0E3D; margin-top: 2em; margin-bottom: 0.8em; }
  .prose-essay blockquote { border-left: 4px solid #F5C518; padding-left: 1.5em; margin: 2em 0; font-style: italic; font-size: 22px; color: #1A237E; }
  .prose-essay ul { margin: 1.4em 0; padding-left: 1.5em; }
  .prose-essay li { font-family: 'Fraunces', serif; font-size: 19px; line-height: 1.75; margin-bottom: 0.5em; list-style: disc; }
  .prose-essay a { color: #1A237E; border-bottom: 2px solid #F5C518; }
</style>
</head>
<body class="antialiased">

<!-- NAV -->
<header class="sticky top-0 z-50 backdrop-blur bg-cream/85 border-b border-navy/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <img src="logo.png" alt="ThisOrThat" class="w-10 h-10 rounded-full object-cover" />
      <div class="leading-tight">
        <div class="font-bold text-navy-ink text-[15px]">ThisOrThat</div>
        <div class="text-[11px] text-navy/60 uppercase tracking-widest">with Bhartendra</div>
      </div>
    </a>
    <nav class="hidden md:flex items-center gap-7 text-sm font-medium text-navy-ink/80">
      <a href="episodes.html" class="hover:text-navy-ink">Episodes</a>
      <a href="guests.html" class="hover:text-navy-ink">Guests</a>
      <a href="articles.html" class="text-navy-ink border-b-2 border-mustard pb-1">Articles</a>
      <a href="feed.html" class="hover:text-navy-ink">Feed</a>
      <a href="calculators.html" class="hover:text-navy-ink">Calculators</a>
      <a href="about.html" class="hover:text-navy-ink">About</a>
    </nav>
  </div>
</header>

<!-- BREADCRUMB -->
<div class="max-w-3xl mx-auto px-6 py-4 text-xs text-navy/60">
  <a href="index.html" class="hover:text-navy">Home</a> /
  <a href="articles.html" class="hover:text-navy">Articles</a> /
  <span class="text-navy-ink" id="bc-title">Article</span>
</div>

<!-- ARTICLE -->
<article class="bg-cream pb-20">
  <header class="max-w-3xl mx-auto px-6 pt-8 pb-12 text-center">
    <div id="a-category" class="text-xs uppercase tracking-[0.3em] text-mustard-deep font-semibold">—</div>
    <h1 id="a-title" class="font-serif text-4xl md:text-6xl font-bold text-navy-ink mt-4 leading-[1.1]">Loading…</h1>
    <p id="a-subtitle" class="mt-5 text-lg text-navy-ink/70 max-w-2xl mx-auto"></p>
    <div class="mt-8 flex items-center justify-center gap-3 text-sm">
      <div id="a-avatar" class="avatar w-10 h-10 rounded-full bg-navy text-mustard text-xs">BS</div>
      <div class="text-left">
        <div id="a-author" class="font-semibold text-navy-ink">Bhartendra Singh</div>
        <div id="a-meta" class="text-xs text-navy/60">—</div>
      </div>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-6">
    <div id="a-hero" class="thumb thumb-1 aspect-[16/9] rounded-2xl"></div>
  </div>

  <div id="a-body" class="max-w-2xl mx-auto px-6 mt-12 prose-essay"></div>
</article>

<!-- MORE -->
<section class="py-16 bg-paper">
  <div class="max-w-6xl mx-auto px-6">
    <h2 class="font-serif text-3xl font-bold text-navy-ink">More essays</h2>
    <div id="more-articles" class="mt-8 grid md:grid-cols-3 gap-6"></div>
  </div>
</section>

<!-- NEWSLETTER -->
<section class="py-16 bg-mustard text-navy-ink">
  <div class="max-w-3xl mx-auto px-6 text-center">
    <div class="text-xs uppercase tracking-[0.3em] font-semibold opacity-70">Slow Thought, weekly</div>
    <h2 class="font-serif text-3xl md:text-4xl font-bold mt-3">One uncomfortable idea every Sunday.</h2>
    <form class="mt-6 flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
      <input type="email" placeholder="you@email.com" class="flex-1 bg-cream border border-navy/20 rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-navy" />
      <button class="bg-navy text-cream px-6 py-3 rounded-full font-semibold hover:bg-navy-ink transition">Subscribe →</button>
    </form>
  </div>
</section>

<footer class="bg-navy-ink text-cream/80 py-14">
  <div class="max-w-7xl mx-auto px-6 text-center text-xs text-cream/40">© 2026 ThisOrThat with Bhartendra.</div>
</footer>

<script>
const formatDate = (iso) => iso ? new Date(iso).toLocaleDateString('en-IN',{month:'short',day:'numeric',year:'numeric'}) : '';
const slug = new URLSearchParams(location.search).get('slug');

fetch('content/articles.json')
  .then(r => r.json())
  .then(articles => {
    const article = slug ? articles.find(a => a.slug === slug) : articles[0];
    if (!article) {
      document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:Inter,sans-serif"><h1 style="font-family:Fraunces,serif;font-size:48px">Article not found</h1><p><a href="articles.html" style="color:#1A237E">← Back to all articles</a></p></div>';
      return;
    }

    const initials = (article.author || 'BS').split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
    document.title = `${article.title} — ThisOrThat`;
    document.getElementById('bc-title').textContent = article.title.slice(0, 50) + (article.title.length > 50 ? '…' : '');
    document.getElementById('a-category').textContent = `${article.category} · Essay`;
    document.getElementById('a-title').textContent = article.title;
    document.getElementById('a-subtitle').textContent = article.subtitle || '';
    document.getElementById('a-author').textContent = article.author || 'Bhartendra Singh';
    document.getElementById('a-avatar').textContent = initials;
    document.getElementById('a-meta').textContent = `${formatDate(article.date)} · ${article.read_minutes || 5} min read`;
    document.getElementById('a-hero').className = `thumb ${article.hero_color || 'thumb-1'} aspect-[16/9] rounded-2xl`;
    document.getElementById('a-body').innerHTML = article.body_html;

    // More articles
    const others = articles.filter(a => a.slug !== article.slug).slice(0, 3);
    document.getElementById('more-articles').innerHTML = others.map(a => `
      <a href="article-detail.html?slug=${a.slug}" class="lift block bg-white rounded-2xl overflow-hidden border border-navy/10">
        <div class="thumb ${a.hero_color || 'thumb-1'} aspect-[16/10]"></div>
        <div class="p-6">
          <div class="text-xs uppercase tracking-widest text-navy/60 font-semibold">${a.category}</div>
          <h3 class="font-serif text-lg font-bold text-navy-ink mt-2 leading-tight">${a.title}</h3>
        </div>
      </a>
    `).join('');
  });
</script>

</body>
</html>
