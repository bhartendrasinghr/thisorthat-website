# Decap CMS configuration for ThisOrThat with Bhartendra
# Docs: https://decapcms.org/docs/configuration-options/

backend:
  name: github
  repo: bhartendrasinghr/thisorthat-website
  branch: main
  base_url: https://thisorthat-website.vercel.app
  auth_endpoint: api/auth

# Optional: local backend for editing without auth during development
# Run `npx decap-server` in another terminal, then visit /admin
local_backend: true

media_folder: "media"
public_folder: "/media"

site_url: https://thisorthat-website.vercel.app
display_url: https://thisorthat-website.vercel.app
logo_url: /logo.png

collections:
  # ───────── ARTICLES ─────────
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{category}} · {{date}}"
    sortable_fields: ['date', 'title', 'category']
    view_filters:
      - name: "featured"
        label: "Featured"
        field: featured
        pattern: true
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "subtitle", label: "Subtitle / dek", widget: "string", required: false }
      - { name: "slug", label: "URL slug", widget: "string", pattern: ['^[a-z0-9]+(-[a-z0-9]+)*$', "Lowercase letters, numbers and single hyphens only. No spaces or capitals, e.g. your-return-expectation"], hint: "Lowercase letters, numbers and hyphens only, no spaces. Used in the URL: /article-detail.html?slug=YOUR-SLUG" }
      - { name: "category", label: "Category", widget: "select", options: ["Behaviour", "Markets", "Investing", "Retirement", "Real Estate", "Tax", "Career", "Wealth", "Global", "Commodities", "Slow Thought"] }
      - { name: "date", label: "Publish date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { name: "author", label: "Author", widget: "string", default: "Bhartendra Singh" }
      - { name: "read_minutes", label: "Read time (minutes)", widget: "number", value_type: "int", min: 1, max: 60, default: 5 }
      - { name: "featured", label: "Featured on articles page?", widget: "boolean", default: false }
      - { name: "hero_color", label: "Hero gradient", widget: "select", options: ["thumb-1", "thumb-2", "thumb-3", "thumb-4", "thumb-5", "thumb-6"], default: "thumb-1", hint: "1: deep purple-navy · 2: dark navy · 3: mustard · 4: ink-navy · 5: red · 6: navy" }
      - { name: "body", label: "Body", widget: "markdown", hint: "Use ## for section headings, > for pull quotes, **bold**, *italic*" }

  # ───────── SITE-WIDE TEXT ─────────
  - name: "site"
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "branding"
        label: "Brand & Social Links"
        file: "content/site.json"
        fields:
          - label: "Brand"
            name: "brand"
            widget: "object"
            fields:
              - { name: "name", label: "Brand name", widget: "string", default: "ThisOrThat" }
              - { name: "tagline", label: "Tagline (under logo)", widget: "string", default: "with Bhartendra" }
              - { name: "youtube_url", label: "YouTube channel URL", widget: "string" }
              - { name: "spotify_url", label: "Spotify URL", widget: "string", required: false }
              - { name: "apple_podcasts_url", label: "Apple Podcasts URL", widget: "string", required: false }
              - { name: "instagram_url", label: "Instagram URL", widget: "string", required: false }
              - { name: "linkedin_url", label: "LinkedIn URL", widget: "string", required: false }
              - { name: "twitter_url", label: "Twitter / X URL", widget: "string", required: false }
              - { name: "contact_email", label: "Contact email", widget: "string" }
          - label: "Homepage"
            name: "home"
            widget: "object"
            fields:
              - { name: "featured_video_id", label: "Featured episode (YouTube video ID)", widget: "string", required: false, hint: "Pin an episode to the homepage billboard. Paste the ID from its YouTube URL (the part after v=). Leave blank to always show the newest upload." }
          - label: "Newsletter"
            name: "newsletter"
            widget: "object"
            fields:
              - { name: "name", label: "Newsletter name", widget: "string" }
              - { name: "tagline", label: "Newsletter tagline", widget: "string" }
              - { name: "subscribe_url", label: "Subscribe URL", widget: "string", required: false }

  # ───────── ABOUT PAGE ─────────
  # Drives /about.html. Edit anything here, hit Publish, the page rebuilds in ~30s.
  - name: "about_page"
    label: "About Page"
    delete: false
    editor:
      preview: false
    files:
      - name: "about"
        label: "About page content"
        file: "content/about.json"
        fields:
          - label: "Host (hero block)"
            name: "host"
            widget: "object"
            fields:
              - { name: "kicker", label: "Eyebrow above name", widget: "string", default: "The host", hint: "Tiny uppercase line above the host name" }
              - { name: "name", label: "Host name", widget: "string" }
              - { name: "tagline", label: "Host one-liner", widget: "text", hint: "Short sentence under the name" }
              - { name: "photo", label: "Host photo", widget: "image", required: false, hint: "Square image works best. If blank, falls back to the BS initials block." }
              - { name: "contact_email", label: "Contact email", widget: "string", hint: "Powers the 'hello@…' button" }
              - { name: "linkedin_url", label: "LinkedIn URL", widget: "string", required: false }
              - { name: "twitter_url", label: "Twitter / X URL", widget: "string", required: false }
              - { name: "instagram_url", label: "Instagram URL", widget: "string", required: false }
          - { name: "story_heading", label: "Story — heading", widget: "string" }
          - name: "story_paragraphs"
            label: "Story — paragraphs"
            widget: "list"
            hint: "Add or remove paragraphs. They render in order, in serif type."
            field: { name: "para", label: "Paragraph", widget: "text" }
          - { name: "stats_kicker", label: "Stats — eyebrow", widget: "string", default: "By the numbers" }
          - { name: "stats_heading", label: "Stats — heading", widget: "string", default: "The show, today." }
          - { name: "stats_extra_label", label: "Stats — 4th tile label", widget: "string", default: "Episode 1 dropped", hint: "Episodes / Guests / Calculators are auto-counted. This is the 4th tile." }
          - { name: "stats_extra_value", label: "Stats — 4th tile value", widget: "string", default: "2023" }
          - { name: "values_heading", label: "Values — heading", widget: "string", default: "What this brand stands for." }
          - name: "values"
            label: "Values (3 cards)"
            widget: "list"
            min: 1
            max: 6
            fields:
              - { name: "number", label: "Number (01 / 02 …)", widget: "string" }
              - { name: "title", label: "Title", widget: "string" }
              - { name: "body", label: "Body", widget: "text" }
          - { name: "contact_kicker", label: "Contact — eyebrow", widget: "string", default: "Get in touch" }
          - { name: "contact_heading", label: "Contact — heading", widget: "string", default: "Want to be on the show?" }
          - { name: "contact_body", label: "Contact — body", widget: "text" }
          - { name: "press_kit_url", label: "Press kit URL (optional)", widget: "string", required: false, hint: "If empty, the Press kit button is hidden." }

  # ───────── FEED (Insta-style cards) ─────────
  # Drives /feed.html. Each item is a square card. Pick a colour variant,
  # write a label + title, optional big-number / attribution / meta footer.
  - name: "feed"
    label: "Feed"
    delete: false
    editor:
      preview: false
    files:
      - name: "feed_items"
        label: "Feed cards"
        file: "content/feed.json"
        fields:
          - name: "items"
            label: "Cards (drag to reorder · first card shows first)"
            widget: "list"
            summary: "{{fields.label}} · {{fields.title | truncate(50)}}"
            fields:
              - { name: "variant", label: "Colour", widget: "select", default: "blue", options: [
                    { label: "Blue (this-blue background, marigold text)",         value: "blue" },
                    { label: "Marigold (yellow background, ink text)",             value: "marigold" },
                    { label: "Paper (cream background, ink text + border)",        value: "paper" },
                    { label: "Red (that-red background, warm-paper text)",         value: "red" },
                    { label: "Ink (black background, marigold text)",              value: "ink" },
                    { label: "Paper-blue (cream background, blue text + border)",  value: "paper-blue" }
                  ], hint: "Pick a colour. Rotate variants for visual rhythm." }
              - { name: "label", label: "Chip label (top-left)", widget: "string", hint: "Tiny uppercase tag. e.g. 'Slow Thought · 042', 'Quote · Ep 086', 'Data card'." }
              - { name: "big_number", label: "Big number (optional)", widget: "string", required: false, hint: "For data cards. e.g. '73%', '₹2.4L'. Renders huge above the title." }
              - { name: "title", label: "Main text", widget: "text", hint: "The sharp line. Keep under ~140 chars or it overflows the card." }
              - { name: "attribution", label: "Attribution (optional)", widget: "string", required: false, hint: "For quote cards — just the name. e.g. 'Saurabh Mukherjea'. The em-dash renders automatically." }
              - { name: "meta", label: "Footer (bottom-right, optional)", widget: "string", required: false, hint: "Likes, source, or 'Swipe →'. Examples: '♥ 4.2K', 'SPIVA India 2024', 'Swipe →'. Leave blank to hide." }

  # ───────── EPISODES (overrides) ─────────
  # Episodes auto-sync from YouTube via sync.py.
  # If you need to override guest name, category, or featured status for any episode,
  # add an entry here keyed by YouTube video ID.
  - name: "episode_overrides"
    label: "Episode Overrides"
    delete: false
    editor:
      preview: false
    files:
      - name: "overrides"
        label: "Episode metadata overrides"
        file: "content/episode-overrides.json"
        fields:
          - label: "Overrides (keyed by YouTube video ID)"
            name: "overrides"
            widget: "list"
            fields:
              - { name: "video_id", label: "YouTube video ID", widget: "string", hint: "The 11-character ID from the YouTube URL (after v=)" }
              - { name: "guest", label: "Override guest name", widget: "string", required: false }
              - { name: "category", label: "Override category", widget: "select", options: ["Behaviour", "Markets", "Investing", "Retirement", "Real Estate", "Tax", "Career", "Wealth", "Global", "Commodities"], required: false }
              - { name: "title", label: "Override title (rarely needed)", widget: "string", required: false }

  # ───────── EPISODE NOTES (the fork, takeaways, chapters) ─────────
  # One JSON file per episode in content/episodes/, named by the YouTube video ID.
  # Fills the rich episode page: summary, the fork, takeaways, timestamped chapters,
  # a matched tool, guest disclosure and disclaimer. Episodes without a file here fall
  # back to the generic layout, so you can add these one at a time (top episodes first).
  - name: "episode_notes"
    label: "Episode Notes"
    label_singular: "Episode note"
    folder: "content/episodes"
    create: true
    delete: true
    extension: "json"
    format: "json"
    identifier_field: "id"
    slug: "{{fields.id}}"
    summary: "{{id}}"
    fields:
      - { name: "id", label: "YouTube video ID", widget: "string", hint: "The 11-character ID after v= in the YouTube URL. This is also the filename." }
      - { name: "duration", label: "Duration (shown on page)", widget: "string", required: false, hint: "e.g. '32 min'" }
      - { name: "durationISO", label: "Duration ISO 8601 (SEO)", widget: "string", required: false, hint: "e.g. 'PT32M24S'. Powers video schema. Optional." }
      - { name: "uploadDate", label: "Upload date YYYY-MM-DD (SEO)", widget: "string", required: false }
      - { name: "summary", label: "About this episode", widget: "text", hint: "2-3 lines. The unique summary Google and readers see." }
      - name: "fork"
        label: "The fork (signature block)"
        widget: "object"
        required: false
        collapsed: false
        fields:
          - { name: "decision", label: "The decision", widget: "text", hint: "The one money question this episode settles. Phrase it as a question." }
          - name: "this"
            label: "THIS side"
            widget: "object"
            fields:
              - { name: "label", label: "Label", widget: "string", hint: "e.g. 'Go global'" }
              - { name: "points", label: "Points (one argument each)", widget: "list", field: { name: "text", label: "Point", widget: "string" } }
          - name: "that"
            label: "THAT side"
            widget: "object"
            fields:
              - { name: "label", label: "Label", widget: "string", hint: "e.g. 'Stay home'" }
              - { name: "points", label: "Points (one argument each)", widget: "list", field: { name: "text", label: "Point", widget: "string" } }
          - { name: "pick", label: "We pick (the verdict)", widget: "text", hint: "Hold the reader, then hand them the honest call." }
      - { name: "takeaways", label: "Takeaways (3 to 5)", widget: "list", required: false, field: { name: "text", label: "Takeaway", widget: "string" } }
      - name: "chapters"
        label: "Chapters (timestamped)"
        widget: "list"
        required: false
        summary: "{{fields.t}}s · {{fields.label}}"
        fields:
          - { name: "t", label: "Start (seconds)", widget: "number", value_type: "int", min: 0 }
          - { name: "label", label: "Chapter title", widget: "string" }
      - name: "tool"
        label: "Matched tool (the do-don't-just-watch nudge)"
        widget: "object"
        required: false
        fields:
          - { name: "slug", label: "Tool page", widget: "string", hint: "e.g. 'asset-allocator.html'" }
          - { name: "label", label: "Tool name", widget: "string", hint: "e.g. 'Asset Allocator'" }
          - { name: "reason", label: "Why this tool", widget: "text" }
      - { name: "guestDisclosure", label: "Guest disclosure (AMFI / SEBI reg)", widget: "text", required: false }
      - { name: "disclaimer", label: "Disclaimer", widget: "text", required: false }
      - name: "seo"
        label: "SEO"
        widget: "object"
        required: false
        fields:
          - { name: "title", label: "SEO title", widget: "string", required: false }
          - { name: "description", label: "Meta description", widget: "string", required: false }

  # ───────── MONEY PEOPLE (advisors / distributors on the Talk-to-a-human page) ─────────
  # Drives the selector on money-person.html. Add only registered MFDs or RIAs who have
  # agreed to receive introductions. Link to a guest profile via "guest_slug" to reuse their
  # photo and show an "On the show" badge. Registration is displayed for transparency.
  - name: "money_people"
    label: "Money People"
    delete: false
    editor:
      preview: false
    files:
      - name: "advisors"
        label: "Advisors & distributors"
        file: "content/advisors.json"
        fields:
          - name: "advisors"
            label: "People (drag to reorder)"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "type", label: "Type", widget: "select", options: ["Mutual Fund Distributor", "Financial Advisor (RIA)"], required: false, hint: "Only list registered MFDs or RIAs who take retail clients." }
              - { name: "reg", label: "Registration number (ARN / SEBI RIA)", widget: "string", required: false, hint: "Shown so visitors can verify on AMFI or SEBI. Leave blank to hide." }
              - { name: "firm", label: "Firm / role", widget: "string", required: false }
              - { name: "guest_slug", label: "Link to guest profile (slug)", widget: "string", required: false, hint: "e.g. vijai-mantri. Reuses their photo and shows an 'On the show' badge." }
              - { name: "photo", label: "Photo", widget: "image", required: false, hint: "If blank and a guest is linked, the guest photo is used, else initials." }
              - { name: "blurb", label: "Good for (one line)", widget: "string", required: false }
              - { name: "specialties", label: "Specialties", widget: "list", required: false }
              - { name: "consent_confirmed", label: "Consent confirmed?", widget: "boolean", default: false, hint: "Tick only once this person has agreed to be listed and to receive introductions." }
              - { name: "featured", label: "Featured", widget: "boolean", default: false }
              - { name: "active", label: "Show on site", widget: "boolean", default: true }

  # ───────── GUESTS (photos + bios) ─────────
  # One markdown file per guest in content/guests/.
  # The "name" field MUST match exactly how the guest appears in episode credits
  # (e.g. "Vijai Mantri" — case-sensitive). Otherwise the auto-link from
  # episodes to this profile will silently break.
  - name: "guests"
    label: "Guest Profiles"
    label_singular: "Guest"
    folder: "content/guests"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    summary: "{{name}} — {{role}}"
    sortable_fields: ['name', 'featured']
    view_filters:
      - name: "featured"
        label: "Featured"
        field: featured
        pattern: true
      - label: "Has photo"
        field: photo
        pattern: ".+"
    fields:
      - { name: "name", label: "Name (must match episode credits exactly)", widget: "string", hint: "Case-sensitive. E.g. 'Vijai Mantri' not 'vijai mantri'." }
      - { name: "slug", label: "URL slug", widget: "string", hint: "Lowercase, hyphens only. E.g. 'vijai-mantri'." }
      - { name: "role", label: "Role / title", widget: "string", hint: "Short one-liner. E.g. 'Founder, VMFS' or 'CEO, DSP Mutual Fund'" }
      - { name: "photo", label: "Photo", widget: "image", required: false, hint: "Square works best. JPG or PNG. Will be cropped to a circle in lists." }
      - { name: "linkedin", label: "LinkedIn URL", widget: "string", required: false }
      - { name: "twitter", label: "Twitter / X URL", widget: "string", required: false }
      - { name: "website", label: "Website / company URL", widget: "string", required: false }
      - { name: "featured", label: "Featured on home page guest grid?", widget: "boolean", default: false, hint: "Featured guests show first on the home page, regardless of episode count." }
      - { name: "quote", label: "Pull quote (one line, no quote marks)", widget: "string", required: false, hint: "The single sharpest line they said. Shows large on the guest card. Keep under 120 chars. Example: 'The industry sells products. Your job is to buy outcomes.'" }
      - { name: "body", label: "Bio", widget: "markdown", hint: "Use ## for section headings, > for pull quotes, **bold**, *italic*. This appears on the guest's profile page." }
